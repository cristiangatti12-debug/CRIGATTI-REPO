<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Reset Vela.ai</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0f1e; color: #e5e7eb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card {
    width: 100%; max-width: 360px;
    background: #141b2d; border: 1px solid #1e2d45;
    border-radius: 20px; padding: 28px 24px; text-align: center;
  }
  .logo {
    width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 18px;
    background: linear-gradient(135deg, #00d4ff 0%, #7b61ff 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700; color: white;
  }
  h1 { font-size: 18px; margin: 0 0 8px; font-weight: 700; }
  p  { font-size: 14px; line-height: 1.5; color: #94a3b8; margin: 0 0 16px; }
  .step { font-size: 13px; color: #cbd5e1; margin: 6px 0; min-height: 1.4em; }
  .step.done::before    { content: "✅  "; }
  .step.pending::before { content: "⏳  "; }
  .spinner {
    width: 36px; height: 36px; margin: 18px auto;
    border: 3px solid rgba(0,212,255,0.18);
    border-top-color: #00d4ff; border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn {
    display: inline-block; margin-top: 18px;
    background: linear-gradient(135deg, #00d4ff 0%, #7b61ff 100%);
    color: white; font-weight: 600; font-size: 14px;
    padding: 10px 24px; border-radius: 12px;
    text-decoration: none; border: none; cursor: pointer;
  }
  .small { font-size: 11px; color: #4a5568; margin-top: 18px; }
</style>
</head>
<body>
  <main class="card" role="main">
    <div class="logo">V</div>
    <h1 id="title">Resetting Vela.ai…</h1>
    <p id="subtitle">Clearing old service workers and cached data. Takes a few seconds.</p>
    <div class="spinner" id="spinner" aria-hidden="true"></div>
    <div class="step pending" id="step-sw">Service workers</div>
    <div class="step pending" id="step-caches">Browser cache</div>
    <div class="step pending" id="step-storage">Local storage</div>
    <div class="step pending" id="step-idb">App database</div>
    <a id="cta" class="btn" href="/" style="display:none">Open Vela.ai</a>
    <div class="small" id="small">If this page hangs, close it and reopen <code>vela-ai-two.vercel.app</code>.</div>
  </main>

<script>
  (function () {
    // Bilingual labels — match Italian when the browser is Italian.
    var isIt = (navigator.language || "en").toLowerCase().indexOf("it") === 0;
    var L = isIt ? {
      title:    "Ripristino di Vela.ai…",
      subtitle: "Sto pulendo i vecchi service worker e la cache. Pochi secondi.",
      sw:       "Service worker",
      caches:   "Cache del browser",
      storage:  "Memoria locale",
      idb:      "Database dell'app",
      cta:      "Apri Vela.ai",
      small:    "Se questa pagina non risponde, chiudila e riapri vela-ai-two.vercel.app.",
      done:     "Pulizia completata. Reindirizzamento…"
    } : {
      title:    "Resetting Vela.ai…",
      subtitle: "Clearing old service workers and cached data. Takes a few seconds.",
      sw:       "Service workers",
      caches:   "Browser cache",
      storage:  "Local storage",
      idb:      "App database",
      cta:      "Open Vela.ai",
      small:    "If this page hangs, close it and reopen vela-ai-two.vercel.app.",
      done:     "Cleanup complete. Redirecting…"
    };
    document.getElementById("title").textContent      = L.title;
    document.getElementById("subtitle").textContent   = L.subtitle;
    document.getElementById("step-sw").textContent      = L.sw;
    document.getElementById("step-caches").textContent  = L.caches;
    document.getElementById("step-storage").textContent = L.storage;
    document.getElementById("step-idb").textContent     = L.idb;
    document.getElementById("cta").textContent          = L.cta;
    document.getElementById("small").innerHTML          = L.small;

    function mark(id) {
      var el = document.getElementById(id);
      if (el) { el.classList.remove("pending"); el.classList.add("done"); }
    }

    // Step 1: unregister all service workers
    var swPromise = ("serviceWorker" in navigator)
      ? navigator.serviceWorker.getRegistrations()
          .then(function (regs) {
            return Promise.all(regs.map(function (r) { return r.unregister().catch(function () {}); }));
          })
          .then(function () { mark("step-sw"); })
          .catch(function () { mark("step-sw"); })
      : Promise.resolve().then(function () { mark("step-sw"); });

    // Step 2: delete all Cache Storage entries
    var cachePromise = ("caches" in window)
      ? caches.keys()
          .then(function (keys) {
            return Promise.all(keys.map(function (k) { return caches.delete(k).catch(function () {}); }));
          })
          .then(function () { mark("step-caches"); })
          .catch(function () { mark("step-caches"); })
      : Promise.resolve().then(function () { mark("step-caches"); });

    // Step 3: wipe localStorage + sessionStorage
    var storagePromise = new Promise(function (resolve) {
      try { localStorage.clear();   } catch (_) {}
      try { sessionStorage.clear(); } catch (_) {}
      mark("step-storage");
      resolve();
    });

    // Step 4: drop all IndexedDB databases (Supabase, etc.)
    var idbPromise = (function () {
      try {
        if (indexedDB && indexedDB.databases) {
          return indexedDB.databases()
            .then(function (dbs) {
              return Promise.all((dbs || []).map(function (info) {
                return new Promise(function (res) {
                  if (!info || !info.name) return res();
                  var req = indexedDB.deleteDatabase(info.name);
                  req.onsuccess = req.onerror = req.onblocked = function () { res(); };
                });
              }));
            })
            .then(function () { mark("step-idb"); })
            .catch(function () { mark("step-idb"); });
        }
      } catch (_) {}
      // Browsers without indexedDB.databases() (older Safari): nothing to do
      mark("step-idb");
      return Promise.resolve();
    })();

    Promise.all([swPromise, cachePromise, storagePromise, idbPromise])
      .then(function () {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("cta").style.display     = "inline-block";
        document.getElementById("subtitle").textContent  = L.done;
        // Auto-redirect after 1.2s; cache buster prevents reusing any
        // late-arriving cached response from the old service worker.
        setTimeout(function () {
          window.location.replace("/?reset=" + Date.now());
        }, 1200);
      });
  })();
</script>
</body>
</html>
